<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  <title>Generador de HTML - TI MÉXICO</title>
</head>
<body>
  <div class="contenedorEditor">
    <div class="editor">
      <form action="" method="post">
        <div class="toolbar">
          <input type="button" class="btn" value="+ Texto" name="texto" title="+Texto" onclick="agregarTexto()" />
          <input type="button" class="btn" value="+ Banner" name="banner" title="+Banner" onclick="agregarBanner()" />
          <input type="button" class="btn" value="+ Estilos" name="texto" title="Estilos" onclick="abrirModalCSS()" />
          <input type="file" accept=".html" onchange="cargarArchivo(event)" />
        </div>

        <div id="contenedor">
        </div>

        <br/>
        <input type="button" class="btn" value="Guardar Plantilla HTML" onclick="descargarHTML()">
        <input type="button" class="btn" value="Limpiar" onclick="limpiarEditor()" />
      </form>
    </div>
    
    
    <div class="preview">
      <div class="preview-controller">
        <h3>Vista previa</h3>
        <input type="button" class="btn" value="Copiar HTML" onclick="obtenerHTML()" />
      </div>
        <iframe id="previewFrame" style="width:100%; height:500px;"></iframe>
    </div>
  </div>


  

<div id="modalCSS" style="display:none; position:fixed; top:20%; left:30%; width:40%; background:white; padding:15px; border:1px solid #ccc; z-index:1000;">

    <h3>Configuración de estilos</h3>

    <div style="margin-bottom:10px;">
        <button id="btn_css_general" class="tab-btn" onclick="mostrarTab('css_general')">CSS General</button>
        <button id="btn_css_efectos" class="tab-btn" onclick="mostrarTab('css_efectos')">Efectos</button>
    </div>

    <div id="tab_css_general">
        <textarea id="css_general" style="width:100%; height:150px;"></textarea>
    </div>

    <div id="tab_css_efectos" style="display:none;">
        <textarea id="css_efectos" style="width:100%; height:150px;"></textarea>
    </div>

    <br>

    <button onclick="guardarCSS()">Guardar</button>
    <button onclick="cerrarModalCSS()">Cerrar</button>

</div>




  <script src="js.js"></script>
</body>
</html>
